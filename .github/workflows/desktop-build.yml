name: Desktop Installers

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "desktop/**"
      - "mobile/assets/**"
      - "scripts/build-desktop-assets.mjs"
      - "electron-builder.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run desktop:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: ClinicNova-Windows-1.6.0
          path: releases/desktop/*.exe
          if-no-files-found: error

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run desktop:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: ClinicNova-macOS-1.6.0
          path: releases/desktop/*.dmg
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: ClinicNova-*
          path: installers
          merge-multiple: true
      - name: Publish desktop installers
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" installers/* --repo "${GITHUB_REPOSITORY}" --title "ClinicNova ${GITHUB_REF_NAME#v}" --notes "Windows ve macOS yerel-öncelikli masaüstü kurulum paketleri. Test dağıtımıdır; ticari dağıtım öncesi platform code-signing/notarization uygulanmalıdır." --prerelease
